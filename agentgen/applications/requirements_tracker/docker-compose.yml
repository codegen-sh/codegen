version: '3'

services:
  requirements-tracker:
    build: .
    container_name: requirements-tracker
    volumes:
      - ./docs:/app/docs
      - ./output:/app/output
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - CODEGEN_USER_ID=${CODEGEN_USER_ID}
    command: --repo ${GITHUB_REPO} --docs /app/docs --output /app/output --slack-channel ${SLACK_CHANNEL} --interval ${INTERVAL:-60}
    restart: unless-stopped